services:
  - type: web
    name: voc-experience-anomaly-agent
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEMO_SEED
        value: "20260702"
      - key: DEMO_DETERMINISTIC
        value: "true"
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com/v1
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: DEEPSEEK_USE_ENV_PROXY
        value: "false"
      - key: LLM_CONNECT_TIMEOUT_SECONDS
        value: "10"
      - key: LLM_READ_TIMEOUT_SECONDS
        value: "60"
      - key: LLM_MAX_RETRIES
        value: "1"
